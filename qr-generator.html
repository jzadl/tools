<!DOCTYPE html>
<!--qr-generator — tools.jzadl.xyz, built by jzadl-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Generator — jzadl tools</title>
<meta name="description" content="Generate QR codes for URLs, text, Wi-Fi, and contacts. Free, instant, no tracking.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; }
body { font-family: 'Inter', sans-serif; background: #1a1a1a; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; }
a { color: inherit; text-decoration: none; }
main { flex: 1; width: 100%; padding: 80px 6vw; max-width: 860px; }

.back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: #555; margin-bottom: 32px; transition: color 0.15s; }
.back-link:hover { color: #aaa; }

.hero { margin-bottom: 48px; }
.hero h1 { font-size: 48px; font-weight: 700; color: #fff; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 12px; }
.hero h1 span { color: #3b82f6; }
.hero-bio { font-size: 15px; color: #888; line-height: 1.65; max-width: 540px; }

/* Tabs */
.tabs-row { display: flex; align-items: center; gap: 4px; margin-bottom: 28px; }
.tab-btn { padding: 5px 14px; font-size: 12px; font-weight: 500; border-radius: 6px; border: 1px solid transparent; cursor: pointer; background: transparent; color: #555; transition: background 0.15s, color 0.15s, border-color 0.15s; font-family: inherit; }
.tab-btn:hover { color: #aaa; }
.tab-btn.active { background: #222; border-color: #2e2e2e; color: #ccc; }
.tab-panel { display: none; }
.tab-panel.active { display: flex; flex-direction: column; gap: 14px; }

/* Inputs */
.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 12px; color: #555; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
.field input, .field textarea, .field select {
  background: #222; border: 1px solid #2e2e2e; border-radius: 8px;
  color: #e0e0e0; font-family: inherit; font-size: 13px; padding: 10px 14px;
  transition: border-color 0.15s; outline: none; width: 100%;
}
.field input:focus, .field textarea:focus, .field select:focus { border-color: #3b82f6; }
.field textarea { resize: vertical; min-height: 80px; }
.field select option { background: #222; }
.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* Generate btn */
.btn-main { display: inline-flex; align-items: center; gap: 6px; padding: 9px 20px; background: #3b82f6; color: #fff; font-size: 13px; font-weight: 500; border-radius: 20px; transition: background 0.15s; cursor: pointer; border: none; font-family: inherit; margin-top: 8px; }
.btn-main:hover { background: #2563eb; }

/* QR output */
.qr-output { margin-top: 40px; display: none; }
.qr-output.visible { display: flex; flex-direction: column; align-items: flex-start; gap: 20px; }
.qr-box { background: #fff; border-radius: 12px; padding: 20px; display: inline-flex; }
.qr-meta { display: flex; flex-direction: column; gap: 10px; }
.qr-meta-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.05em; }
.qr-meta-value { font-size: 13px; color: #888; word-break: break-all; max-width: 400px; }

/* Download buttons */
.dl-row { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-dl { padding: 7px 16px; background: #222; border: 1px solid #2e2e2e; border-radius: 20px; font-size: 12px; font-weight: 500; color: #888; cursor: pointer; font-family: inherit; transition: border-color 0.15s, color 0.15s; }
.btn-dl:hover { border-color: #3b82f6; color: #fff; }

/* Size slider */
.slider-row { display: flex; align-items: center; gap: 12px; }
.slider-row input[type=range] { flex: 1; accent-color: #3b82f6; }
.slider-val { font-size: 12px; color: #555; min-width: 50px; }

footer { border-top: 1px solid #2e2e2e; padding: 20px 6vw; font-size: 12px; color: #444; display: flex; gap: 12px; }
footer a { color: #555; transition: color 0.15s; }
footer a:hover { color: #888; }

@media (max-width: 500px) { .row-2 { grid-template-columns: 1fr; } .hero h1 { font-size: 32px; } }
</style>
</head>
<body>
<main>
  <a href="https://tools.jzadl.xyz" class="back-link">← tools.jzadl.xyz</a>

  <div class="hero">
    <h1>QR<span>.</span>Generator</h1>
    <p class="hero-bio">Generate QR codes for URLs, plain text, Wi-Fi networks, and contacts. Instant, free, nothing leaves your browser.</p>
  </div>

  <!-- Type tabs -->
  <div class="tabs-row">
    <button class="tab-btn active" onclick="switchTab('url', this)">URL</button>
    <button class="tab-btn" onclick="switchTab('text', this)">Text</button>
    <button class="tab-btn" onclick="switchTab('wifi', this)">Wi-Fi</button>
    <button class="tab-btn" onclick="switchTab('contact', this)">Contact</button>
  </div>

  <!-- URL -->
  <div class="tab-panel active" id="tab-url">
    <div class="field">
      <label>URL</label>
      <input type="url" id="url-input" placeholder="https://jzadl.xyz" oninput="autoGenerate()">
    </div>
    <div class="field">
      <label>Size</label>
      <div class="slider-row">
        <input type="range" id="url-size" min="128" max="512" step="32" value="256" oninput="updateSlider('url-size','url-size-val');autoGenerate()">
        <span class="slider-val" id="url-size-val">256px</span>
      </div>
    </div>
  </div>

  <!-- Text -->
  <div class="tab-panel" id="tab-text">
    <div class="field">
      <label>Text</label>
      <textarea id="text-input" placeholder="Any text, up to ~2900 characters..." oninput="autoGenerate()"></textarea>
    </div>
    <div class="field">
      <label>Size</label>
      <div class="slider-row">
        <input type="range" id="text-size" min="128" max="512" step="32" value="256" oninput="updateSlider('text-size','text-size-val');autoGenerate()">
        <span class="slider-val" id="text-size-val">256px</span>
      </div>
    </div>
  </div>

  <!-- Wi-Fi -->
  <div class="tab-panel" id="tab-wifi">
    <div class="row-2">
      <div class="field">
        <label>Network Name (SSID)</label>
        <input type="text" id="wifi-ssid" placeholder="MyNetwork" oninput="autoGenerate()">
      </div>
      <div class="field">
        <label>Security</label>
        <select id="wifi-sec" onchange="autoGenerate()">
          <option value="WPA">WPA/WPA2</option>
          <option value="WEP">WEP</option>
          <option value="">None (open)</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="text" id="wifi-pass" placeholder="Leave empty if open network" oninput="autoGenerate()">
    </div>
    <div class="field">
      <label>Size</label>
      <div class="slider-row">
        <input type="range" id="wifi-size" min="128" max="512" step="32" value="256" oninput="updateSlider('wifi-size','wifi-size-val');autoGenerate()">
        <span class="slider-val" id="wifi-size-val">256px</span>
      </div>
    </div>
  </div>

  <!-- Contact (vCard) -->
  <div class="tab-panel" id="tab-contact">
    <div class="row-2">
      <div class="field">
        <label>First Name</label>
        <input type="text" id="vcard-first" placeholder="Jesus" oninput="autoGenerate()">
      </div>
      <div class="field">
        <label>Last Name</label>
        <input type="text" id="vcard-last" placeholder="Last" oninput="autoGenerate()">
      </div>
    </div>
    <div class="row-2">
      <div class="field">
        <label>Phone</label>
        <input type="tel" id="vcard-phone" placeholder="+1 234 567 8900" oninput="autoGenerate()">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="vcard-email" placeholder="me@jzadl.xyz" oninput="autoGenerate()">
      </div>
    </div>
    <div class="field">
      <label>Website</label>
      <input type="url" id="vcard-url" placeholder="https://jzadl.xyz" oninput="autoGenerate()">
    </div>
    <div class="field">
      <label>Size</label>
      <div class="slider-row">
        <input type="range" id="contact-size" min="128" max="512" step="32" value="256" oninput="updateSlider('contact-size','contact-size-val');autoGenerate()">
        <span class="slider-val" id="contact-size-val">256px</span>
      </div>
    </div>
  </div>

  <!-- Output -->
  <div class="qr-output" id="qrOutput">
    <div class="qr-box" id="qrBox"></div>
    <div class="qr-meta">
      <div>
        <div class="qr-meta-label">Encoded content</div>
        <div class="qr-meta-value" id="qrContent"></div>
      </div>
      <div class="dl-row">
        <button class="btn-dl" onclick="downloadQR('png')">Download PNG</button>
        <button class="btn-dl" onclick="downloadQR('svg')">Download SVG</button>
      </div>
    </div>
  </div>

</main>
<footer>
  <a href="https://tools.jzadl.xyz">tools.jzadl.xyz</a>
  <span>·</span>
  <a href="https://jzadl.xyz">jzadl.xyz</a>
  <span>·</span>
  <a href="mailto:contact@jzadl.xyz">contact@jzadl.xyz</a>
  <span>·</span>
  <span>© 2026-present</span>
</footer>

<script>
let currentTab = 'url';
let qrInstance = null;
let debounceTimer = null;

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
  currentTab = tab;
  autoGenerate();
}

function updateSlider(id, valId) {
  document.getElementById(valId).textContent = document.getElementById(id).value + 'px';
}

function getContent() {
  switch (currentTab) {
    case 'url': {
      const v = document.getElementById('url-input').value.trim();
      return v || null;
    }
    case 'text': {
      const v = document.getElementById('text-input').value.trim();
      return v || null;
    }
    case 'wifi': {
      const ssid = document.getElementById('wifi-ssid').value.trim();
      if (!ssid) return null;
      const sec = document.getElementById('wifi-sec').value;
      const pass = document.getElementById('wifi-pass').value;
      return `WIFI:T:${sec};S:${ssid};P:${pass};;`;
    }
    case 'contact': {
      const first = document.getElementById('vcard-first').value.trim();
      const last = document.getElementById('vcard-last').value.trim();
      if (!first && !last) return null;
      const phone = document.getElementById('vcard-phone').value.trim();
      const email = document.getElementById('vcard-email').value.trim();
      const url = document.getElementById('vcard-url').value.trim();
      return `BEGIN:VCARD\nVERSION:3.0\nN:${last};${first}\nFN:${first} ${last}\n${phone ? 'TEL:' + phone + '\n' : ''}${email ? 'EMAIL:' + email + '\n' : ''}${url ? 'URL:' + url + '\n' : ''}END:VCARD`;
    }
  }
  return null;
}

function getSize() {
  const sizeMap = { url: 'url-size', text: 'text-size', wifi: 'wifi-size', contact: 'contact-size' };
  return parseInt(document.getElementById(sizeMap[currentTab]).value);
}

function autoGenerate() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(generate, 120);
}

function generate() {
  const content = getContent();
  const output = document.getElementById('qrOutput');
  if (!content) { output.classList.remove('visible'); return; }

  const size = getSize();
  const box = document.getElementById('qrBox');
  box.innerHTML = '';

  try {
    qrInstance = new QRCode(box, {
      text: content,
      width: size,
      height: size,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  } catch(e) {
    box.innerHTML = '<div style="padding:16px;font-size:12px;color:#f87171;">Content too long for QR code.</div>';
  }

  document.getElementById('qrContent').textContent = content.length > 80 ? content.substring(0, 80) + '…' : content;
  output.classList.add('visible');
}

function downloadQR(format) {
  const content = getContent();
  if (!content) return;
  const size = getSize();

  if (format === 'png') {
    const canvas = document.querySelector('#qrBox canvas');
    if (!canvas) return;
    const link = document.createElement('a');
    link.download = 'qrcode.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } else if (format === 'svg') {
    // Build SVG QR manually via canvas data
    const canvas = document.querySelector('#qrBox canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    const imageData = ctx.getImageData(0, 0, w, h);
    const cellSize = 1;
    let rects = '';
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const idx = (y * w + x) * 4;
        if (imageData.data[idx] < 128) {
          rects += `<rect x="${x}" y="${y}" width="1" height="1" fill="#000"/>`;
        }
      }
    }
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" width="${size}" height="${size}"><rect width="${w}" height="${h}" fill="#fff"/>${rects}</svg>`;
    const blob = new Blob([svg], { type: 'image/svg+xml' });
    const link = document.createElement('a');
    link.download = 'qrcode.svg';
    link.href = URL.createObjectURL(blob);
    link.click();
  }
}
</script>
</body>
</html>
